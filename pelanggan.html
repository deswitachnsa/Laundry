<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Pelanggan — Nisa Laundry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sky: #3b82f6; --sky-dark: #1d4ed8; --sky-light: #eff6ff; --sky-mid: #bfdbfe;
  --navy: #0f172a; --muted: #64748b; --muted2: #94a3b8;
  --bg: #f8faff; --surface: #fff; --border: #e2e8f0;
  --green: #16a34a; --green-light: #f0fdf4;
  --amber: #d97706; --amber-light: #fffbeb;
  --red: #dc2626; --red-light: #fef2f2;
  --gold: #c9a84c;
  --radius: 12px; --radius-lg: 18px;
  --shadow: 0 1px 4px rgba(15,23,42,0.06);
  --shadow-md: 0 4px 20px rgba(15,23,42,0.09);
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--navy); font-size: 14px; min-height: 100vh; }

.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 60px; background: white; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 28px; gap: 16px; box-shadow: var(--shadow);
}
.logo-mark { width: 32px; height: 32px; background: linear-gradient(135deg, var(--gold), #a07730); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-mark svg { width: 16px; height: 16px; fill: white; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--navy); }
.topbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.user-pill { display: flex; align-items: center; gap: 8px; padding: 5px 12px 5px 5px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 100px; }
.user-avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), #a07730); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; }
.user-name { font-size: 12px; font-weight: 600; color: var(--navy); }
.btn-logout { padding: 6px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: var(--red); background: var(--red-light); border: 1px solid #fecaca; cursor: pointer; transition: all 0.2s; }
.btn-logout:hover { background: #fecaca; }

.main { padding: 80px 28px 40px; max-width: 900px; margin: 0 auto; }

/* WELCOME */
.welcome-card {
  background: linear-gradient(135deg, var(--navy) 0%, #1e3a5f 100%);
  border-radius: var(--radius-lg); padding: 32px 36px;
  margin-bottom: 28px; position: relative; overflow: hidden;
}
.welcome-card::before {
  content: ''; position: absolute; top: -80px; right: -80px;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, transparent 70%);
}
.welcome-card::after {
  content: ''; position: absolute; bottom: -60px; left: 40%;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
}
.welcome-content { position: relative; z-index: 1; }
.welcome-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); border-radius: 100px; padding: 4px 12px; font-size: 11px; font-weight: 500; color: #fcd34d; margin-bottom: 12px; }
.welcome-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: white; margin-bottom: 6px; }
.welcome-title span { color: #93c5fd; }
.welcome-sub { font-size: 13px; color: rgba(255,255,255,0.55); }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.stat-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
.stat-icon svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }
.stat-blue .stat-icon { background: var(--sky-light); color: var(--sky); }
.stat-amber .stat-icon { background: var(--amber-light); color: var(--amber); }
.stat-green .stat-icon { background: var(--green-light); color: var(--green); }
.stat-val { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--navy); }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* PESANAN CARDS */
.section-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--navy); }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--muted2); fill: none; stroke-width: 2; pointer-events: none; }
.search-input { padding: 8px 12px 8px 32px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; width: 200px; outline: none; background: white; transition: all 0.2s; }
.search-input:focus { border-color: var(--sky); }

.pesanan-list { display: flex; flex-direction: column; gap: 12px; }
.pesanan-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; transition: all 0.2s; }
.pesanan-card:hover { border-color: var(--sky-mid); box-shadow: var(--shadow-md); }
.pc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.pc-id { font-family: monospace; font-size: 11px; font-weight: 600; color: var(--muted2); background: var(--bg); padding: 3px 8px; border-radius: 5px; }
.pc-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 600; }
.b-masuk { background: #dbeafe; color: #1d4ed8; }
.b-dicuci { background: #fef9c3; color: #a16207; }
.b-disetrika { background: #e0f2fe; color: #0369a1; }
.b-selesai { background: #dcfce7; color: #15803d; }
.pc-mid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 14px; }
.pc-field-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted2); margin-bottom: 4px; }
.pc-field-val { font-size: 14px; font-weight: 500; color: var(--navy); }
.pc-field-val.mono { font-family: monospace; font-size: 13px; }
.pc-progress { }
.progress-track { height: 5px; background: #f1f5f9; border-radius: 3px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--sky), var(--sky-dark)); transition: width 0.6s ease; }
.progress-steps { display: flex; justify-content: space-between; margin-top: 6px; }
.progress-step { font-size: 10px; color: var(--muted2); }
.progress-step.done { color: var(--sky); font-weight: 600; }

.notif-card {
  background: linear-gradient(135deg, #f0fdf4, #dcfce7);
  border: 1px solid #bbf7d0; border-radius: var(--radius-lg);
  padding: 16px 20px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 14px;
}
.notif-icon { width: 36px; height: 36px; border-radius: 9px; background: var(--green); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.notif-icon svg { width: 17px; height: 17px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; }
.notif-text strong { font-size: 13px; font-weight: 600; color: var(--green); display: block; }
.notif-text span { font-size: 12px; color: #166534; }

.empty-state { padding: 60px 20px; text-align: center; color: var(--muted2); font-size: 13px; background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); }
.empty-state-icon { width: 52px; height: 52px; border-radius: 14px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
.empty-state-icon svg { width: 24px; height: 24px; stroke: var(--muted2); fill: none; stroke-width: 1.5; stroke-linecap: round; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
  <span class="brand-name">Nisa Laundry</span>
  <div class="topbar-right">
    <div class="user-pill">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name">Pelanggan</span>
    </div>
    <button class="btn-logout" onclick="doLogout()">Keluar</button>
  </div>
</div>

<div class="main">

  <!-- NOTIFIKASI SELESAI -->
  <div id="notif-area"></div>

  <!-- WELCOME -->
  <div class="welcome-card">
    <div class="welcome-content">
      <div class="welcome-badge">
        <svg viewBox="0 0 24 24" width="12" height="12" style="stroke:#fcd34d;fill:none;stroke-width:2;stroke-linecap:round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Portal Pelanggan
      </div>
      <div class="welcome-title">Halo, <span id="welcome-name">Pelanggan</span></div>
      <div class="welcome-sub">Pantau status laundry Anda di sini secara real-time.</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card stat-blue">
      <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
      <div class="stat-val" id="s-total">0</div>
      <div class="stat-lbl">Total Pesanan Saya</div>
    </div>
    <div class="stat-card stat-amber">
      <div class="stat-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="stat-val" id="s-proses">0</div>
      <div class="stat-lbl">Sedang Diproses</div>
    </div>
    <div class="stat-card stat-green">
      <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
      <div class="stat-val" id="s-selesai">0</div>
      <div class="stat-lbl">Sudah Selesai</div>
    </div>
  </div>

  <!-- PESANAN -->
  <div class="section-title-row">
    <div class="section-title">Pesanan Saya</div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="search-input" placeholder="Cari pesanan..." oninput="renderPesanan()" />
    </div>
  </div>
  <div id="pesanan-list" class="pesanan-list"></div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var sess = JSON.parse(localStorage.getItem('nl_session') || 'null');
  if (!sess || sess.role !== 'customer') { window.location.href = 'login.html'; return; }

  var myName = sess.name;
  document.getElementById('welcome-name').textContent = myName;
  document.getElementById('user-name').textContent = myName;
  document.getElementById('user-avatar').textContent = myName.charAt(0).toUpperCase();

  function getData() { return JSON.parse(localStorage.getItem('nl_pesanan') || '[]'); }

  function fmtRp(n) { return 'Rp '+Math.round(n).toLocaleString('id-ID'); }

  var STATUS_ORDER = ['Masuk','Dicuci','Disetrika','Selesai'];
  function statusPct(s) { var i=STATUS_ORDER.indexOf(s); return i<0?0:Math.round(((i+1)/4)*100); }

  function badgeClass(s) {
    var m={'Masuk':'b-masuk','Dicuci':'b-dicuci','Disetrika':'b-disetrika','Selesai':'b-selesai'};
    return m[s]||'b-masuk';
  }

  function renderNotif(pesanan) {
    var selesai = pesanan.filter(function(p){return p.status==='Selesai';});
    var area = document.getElementById('notif-area');
    area.innerHTML = '';
    selesai.forEach(function(p) {
      var el = document.createElement('div');
      el.className = 'notif-card';
      el.innerHTML = '<div class="notif-icon"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>'+
        '<div class="notif-text"><strong>Laundry Selesai</strong><span>Pesanan #'+('00'+p.id).slice(-3)+' sudah selesai dan siap diambil!</span></div>';
      area.appendChild(el);
    });
  }

  window.renderPesanan = function() {
    var allData = getData();
    var myData = allData.filter(function(p){return p.pelanggan===myName;});
    var q = (document.getElementById('search-input').value||'').toLowerCase();
    var filtered = myData.filter(function(p){
      return p.layanan.toLowerCase().indexOf(q)>-1 || p.status.toLowerCase().indexOf(q)>-1 || String(p.id).indexOf(q)>-1;
    });

    document.getElementById('s-total').textContent = myData.length;
    document.getElementById('s-proses').textContent = myData.filter(function(p){return p.status!=='Selesai';}).length;
    document.getElementById('s-selesai').textContent = myData.filter(function(p){return p.status==='Selesai';}).length;

    renderNotif(myData);

    var list = document.getElementById('pesanan-list');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty-state">'+
        '<div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>'+
        (myData.length ? 'Tidak ada pesanan yang cocok.' : 'Belum ada pesanan atas nama Anda.')+
        '</div>';
      return;
    }

    list.innerHTML = filtered.reverse().map(function(p) {
      var pct = statusPct(p.status);
      var steps = STATUS_ORDER.map(function(s,i) {
        return '<span class="progress-step'+(STATUS_ORDER.indexOf(p.status)>=i?' done':'')+'">'+s+'</span>';
      }).join('');
      return '<div class="pesanan-card">'+
        '<div class="pc-top">'+
          '<span class="pc-id">#'+('00'+p.id).slice(-3)+'</span>'+
          '<span class="pc-badge '+badgeClass(p.status)+'">'+p.status+'</span>'+
        '</div>'+
        '<div class="pc-mid">'+
          '<div><div class="pc-field-lbl">Layanan</div><div class="pc-field-val">'+p.layanan+'</div></div>'+
          '<div><div class="pc-field-lbl">Berat</div><div class="pc-field-val">'+p.berat+' kg</div></div>'+
          '<div><div class="pc-field-lbl">Total</div><div class="pc-field-val mono">'+fmtRp(p.total)+'</div></div>'+
          '<div><div class="pc-field-lbl">Est. Selesai</div><div class="pc-field-val">'+p.tglSelesai+'</div></div>'+
        '</div>'+
        '<div class="pc-progress">'+
          '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
          '<div class="progress-steps">'+steps+'</div>'+
        '</div>'+
        '</div>';
    }).join('');
  };

  window.doLogout = function() {
    localStorage.removeItem('nl_session');
    window.location.href = 'login.html';
  };

  renderPesanan();

  // Auto-refresh tiap 10 detik
  setInterval(renderPesanan, 10000);
});
</script>
</body>
</html>
